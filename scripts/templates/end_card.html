<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Amiri';
    src: url('file:///{{ fonts_dir }}/Amiri-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Amiri', Georgia, 'Times New Roman', serif;
    background: #1a1a2e;
  }

  .card {
    position: relative;
    width: 1080px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    {% if not background_b64 %}display: none;{% endif %}
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.70) 0%,
      rgba(0, 0, 0, 0.82) 50%,
      rgba(0, 0, 0, 0.70) 100%
    );
  }

  .content {
    position: relative;
    z-index: 1;
    width: 860px;
    text-align: center;
    padding: 0 20px;
  }

  .thankyou-persian {
    direction: rtl;
    font-family: 'Amiri', Georgia, serif;
    font-size: 96px;
    line-height: 1.4;
    color: #f5e6c8;
    text-shadow: 0 2px 18px rgba(0, 0, 0, 0.95);
    margin-bottom: 20px;
  }

  .song-info {
    font-size: 26px;
    color: rgba(255, 255, 255, 0.60);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    direction: ltr;
    font-family: Georgia, serif;
    font-style: italic;
    margin-bottom: 40px;
  }

  .divider {
    width: 80px;
    height: 2px;
    background: rgba(240, 192, 64, 0.5);
    margin: 0 auto 36px;
  }

  .cta {
    direction: ltr;
    font-family: Georgia, serif;
    font-size: 36px;
    color: #f0c040;
    font-style: italic;
    text-shadow: 0 0 14px rgba(240, 192, 64, 0.45);
    margin-bottom: 16px;
  }

  .footer {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 18px;
    letter-spacing: 4px;
    color: rgba(255, 255, 255, 0.45);
    text-transform: uppercase;
    direction: ltr;
    font-family: Georgia, serif;
  }
</style>
</head>
<body>
<div class="card">
  {% if background_b64 %}
  <img class="bg" src="{{ background_b64 }}" alt="">
  {% endif %}
  <div class="overlay"></div>

  <div class="content">
    <div class="thankyou-persian">شکریہ</div>
    <div class="song-info">{{ title }} &middot; {{ artist }}</div>
    <div class="divider"></div>
    <div class="cta">Subscribe for more</div>
  </div>

  <div class="footer">PersianBridge</div>
</div>
</body>
</html>
